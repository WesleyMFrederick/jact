      role: parent invocation (decompose query → ToDo)
    - name: /continuous-learning
      role: Layer-1 loop (friction capture)
      availability: NOT loaded in available skills this session
    - name: /loop
      role: Layer-2 ODD loop (goal/criteria/constraints/build/iterate)
      availability: NOT loaded in available skills this session

  tags:
    - "#AUTONOMOUS-MODE"

  code_blocks:
    - id: baseline-extract
      command: "jact extract file plan.md"
      result: "Validation failed: File not found (graceful) + scope suggestion + disambiguation candidate list"
    - id: baseline-ast
      command: "jact ast plan.md"
      result: "Unhandled ENOENT crash w/ Node stack trace (no scope, no graceful error)"
      stack_origin: "MarkdownParser.parseFile (dist/core/MarkdownParser/MarkdownParser.js:57:33) ← JactCli.getAst (dist/jact.js:82:28)"

  explicit_sections:
    ideal_outcome:
      - "Using the scope folder functionality works the same for jact <extract | ast>"
      - "JTBD: USER/AGENT have a consistent experience when using arguments, regardless of sub-commands → pleasing/logical UI"
    constraints_C:
      - "1. Clarify goal using adenhq.com ODD guidance #1-start-with-a-goal"
      - "2. Define success criteria per adenhq.com ODD #2-define-criteria"
      - "3. Use metrics defined at adenhq.com goals-outcomes#success-criteria"
      - "4. Define constraints per guidance"
      - "5. Persist all design docs in design-docs/features/202605012352-ast-smart-default-scope"
      - "6. Persist structured content in YAML format"
      - "7. Final implementation uses ODD workflow"
    hypotheses_H:
      - "8. AGENT can run #AUTONOMOUS-MODE for this loop"
      - "9. AGENT can leverage prior extract-scope work"
      - "10. AGENT can surface correct Type-1 decisions to USER"
      - "11. AGENT can use /loop to combine ODD + continuous-learning"
      - "12. AGENT can THINK DEEPLY first + present Pólya 4-step framework BEFORE EDIT/UPDATE/CREATE"

  inline_refs:
    urls:
      - https://docs.adenhq.com/building-agent/concepts/outcome-driven-development#1-start-with-a-goal
      - https://docs.adenhq.com/building-agent/concepts/outcome-driven-development#2-define-criteria
      - https://docs.adenhq.com/building-agent/concepts/goals-outcomes#success-criteria
      - https://docs.adenhq.com/building-agent/concepts/outcome-driven-development
    paths:
      - design-docs/features/202605012352-ast-smart-default-scope/
      - design-docs/features/20260501-extract-smart-default-scope/  # prior PR (referenced via H9)

