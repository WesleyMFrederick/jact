a2_catalog_prompt:
  description: Index a1 tokens → bucket table. Seeds artifacts table at [b].

  buckets:
    goal:
      - "Parity: jact ast === jact extract for scope/file-resolution UX"
      - "JTBD: consistent CLI across sub-commands"
    constraint:
      - "Persist artifacts to feature folder"
      - "YAML format for structured content"
      - "Follow ODD workflow + adenhq.com goal/criteria/metrics guidance"
    hypothesis:
      - "AGENT runs #AUTONOMOUS-MODE"
      - "AGENT leverages extract-scope prior work as template"
      - "AGENT surfaces Type-1 decisions"
      - "AGENT uses /loop slash-cmd for ODD"
      - "AGENT presents Pólya 4-step plan BEFORE any code edit"
    baseline:
      - "extract: graceful + smart-default-scope already shipped"
      - "ast: NO scope, NO graceful error, NO file resolution → raw ENOENT"
    slash_cmd:
      - "/tasks-convert-prompt (orchestrator)"
      - "/continuous-learning (Layer 1, NOT loaded)"
      - "/loop (Layer 2, NOT loaded)"
    domain_vocab:
      - jact
      - extract (sub-command, has scope)
      - ast (sub-command, missing scope)
      - --scope flag
      - cwd-git (auto-infer source)
      - smart default
      - disambiguation
      - ODD (Outcome-Driven Development)
      - Pólya 4-step
      - "Type I/II decision"
      - "#AUTONOMOUS-MODE"
      - JTBD

