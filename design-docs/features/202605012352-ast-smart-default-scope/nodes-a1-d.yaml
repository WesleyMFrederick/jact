d_define_goal_ODD_1:
  description: |
    First node of Layer-2 ODD loop. Defines the goal per adenhq.com ODD-1.
    Goal must be: outcome-oriented, observable, decoupled from implementation.

  goal_statement: |
    USER and AGENT invoking `jact ast <target>` from inside a project resolve
    targets by name (file path or filename) WITHOUT declaring search root,
    with the same default-scope inference, scope-override semantics, and
    ambiguous-match disambiguation as `jact extract <subcommand> <target>`.

  jtbd: |
    When I run `jact ast <file>` against a markdown file inside a project I
    can identify (cwd, .git root, package.json root), I want file resolution
    and error UX to behave identically to `jact extract`, so I get a
    predictable, consistent CLI without re-learning conventions per sub-command.

  outcome_decoupled_from_implementation:
    - "Outcome stated in user-observable terms (resolves by name, no root declaration, consistent error UX)"
    - "No mention of buildCache, FileCache, MarkdownParser, --scope flag wiring, etc. (implementation deferred to [j])"

  in_scope_for_this_loop:
    - "ast file resolution by name (cwd-git auto-infer, like extract)"
    - "ast --scope <folder> override flag (parity with extract)"
    - "ast graceful error path (matches extract's 'File not found' + suggestions + candidates)"
    - "ast ambiguous-match disambiguation (BI Row 5 parity)"

  out_of_scope_unless_user_confirms:
    - "ast output formatting flags (--format, --verbose)"
    - "Retiring the JACT TOOL RULES global workaround (separate hygiene task)"
    - "Net-new ast capabilities not present in extract (e.g., ast diffing, ast filtering)"

  resolved_via_falsification:
    # Per learning: falsify hypotheses BEFORE surfacing Type-1 questions to USER.
    # All 3 prior "Type-1" questions resolved from evidence already in context.
    - id: T1-A
      question: "Parity scope — file resolution + disambiguation only, OR also output formatting?"
      hypothesis: "USER scoped parity to scope/folder functionality only, not output formatting."
      falsification_test: "Re-read USER's Ideal Outcome statement verbatim."
      evidence: |
        USER's exact words: "Using the scope folder functionality works the same for
        jact <extract | ast>". Phrase 'scope folder functionality' is the named subject.
        Output formatting (--format/--verbose) NOT mentioned anywhere in prompt.
      verdict: RESOLVED
      decision: "Parity scope = file resolution + scope-override + disambiguation. Output formatting OUT OF SCOPE for this loop. USER may extend later."

    - id: T1-B
      question: "Should ast accept --scope <folder> flag mirroring extract?"
      hypothesis: "Parity with extract requires the same --scope <folder> flag on ast."
      falsification_test: "Verify extract uses --scope flag as the override mechanism; verify Ideal Outcome demands sameness."
      evidence: |
        Prior plan.md line 77: 'src/jact.ts:1281, 1339, 1398 — Commander --scope <folder>
        no default'. Extract's mechanism IS --scope. Ideal Outcome demands same UX.
        Therefore ast must accept --scope <folder>.
      verdict: RESOLVED
      decision: "Yes — ast gets --scope <folder> flag mirroring extract."

    - id: T1-C
      question: "Are /continuous-learning and /loop slash-commands available this session?"
      hypothesis: "process-tree.md's note ('referenced by user but not loaded') is outdated."
      falsification_test: "Inspect current session's available-skills list."
      evidence: |
        Current system reminder lists BOTH skills as available:
        - 'loop: Run a prompt or slash command on a recurring interval...'
        - 'continuous-learning: Continuous Learning'
        process-tree.md's note was stale.
      verdict: RESOLVED
      decision: "Both available. Layers 1 and 2 invocations unblocked."

    - id: T1-D
      question: "Constraint #5 says ObsidianVault but file lives at ObsidianVaultNew — which is correct?"
      hypothesis: "ObsidianVaultNew is the active vault; ObsidianVault path in constraint is stale wording."
      falsification_test: "ls both directories; check where the feature folder actually lives."
      evidence: |
        /Users/wesleyfrederick/Documents/ObsidianVault/ exists but contains only
        _js-scripts and old subfolders.
        /Users/wesleyfrederick/Documents/ObsidianVaultNew/ contains the active
        jact repo where process-tree.md (last-modified 05/02/26) lives.
        Neither is a symlink to the other.
      verdict: RESOLVED
      decision: "Persist to ObsidianVaultNew. Constraint wording is stale legacy path."

  next_nodes:
    - "[e] define measurable success criteria (ODD-2)"
    - "[f] define constraints (ODD-3)"
    - "[i] understand problem (Pólya-1, strategic)"

  halt: |
    HALTING per USER instruction at end of node [d]. All Type-1 questions
    resolved autonomously via falsification. No blockers for [e].
