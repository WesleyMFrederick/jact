goal: >
  When an LLM runs `jact validate <file> --scope <root>`, stdout contains
  only the information needed to fix link violations — nothing more.

success_criteria:
  - id: SC-1
    description: Clean file produces near-zero output
    metric: output_contains
    condition:
      matches_exactly: "OK: {n} citations valid"
      line_count: 1
    measured_by: "jact validate <clean-file> --scope <scope> | wc -l"

  - id: SC-2
    description: Dirty file output contains only broken citations
    metric: output_contains
    condition:
      must_contain:
        - "ERRORS ("
        - "FAILED:"
      must_not_contain:
        - "VALID CITATIONS"
        - "SUMMARY:"
        - "Citation Validation Report"
    measured_by: "jact validate <broken-file>"

  - id: SC-3
    description: --verbose flag restores full current output
    metric: output_contains
    condition:
      must_contain:
        - "VALID CITATIONS"
        - "SUMMARY:"
        - "Citation Validation Report"
    measured_by: "jact validate <file> --scope <scope> --verbose"

  - id: SC-4
    description: JSON output shape is unchanged
    metric: custom
    condition:
      json_schema_unchanged: true
    measured_by: "jact validate <file> --format json | jq keys"

  - id: SC-5
    description: Exit codes are preserved
    metric: custom
    condition:
      exit_code_map:
        clean_file: 0
        validation_errors: 1
        system_error: 2
    measured_by: "jact validate <file>; echo $?"

  - id: SC-6
    description: No regressions — all existing tests pass
    metric: custom
    condition:
      test_suite_passes: true
    measured_by: "npm test"

  - id: SC-7
    description: Token reduction — clean file output under 100 bytes
    metric: custom
    condition:
      max_bytes: 100
      baseline_bytes: ~6000
    measured_by: "jact validate <clean-file> --scope <scope> | wc -c"
